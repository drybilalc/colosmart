<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Smart Colostrum</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SmartColostrum" />
  <meta name="theme-color" content="#0a1628" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:  #e8a945;
  --amber: #c97d1e;
  --navy:  #0a1628;
  --teal:  #1a4f6e;
  --r: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--navy); color: #fff; font-family: 'DM Sans', sans-serif; overflow: hidden; }

/* ─── SPLASH ─── */
#splash {
  position: fixed; inset: 0; z-index: 999;
  background: var(--navy);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity .8s ease;
}
#splash.out { opacity: 0; pointer-events: none; }

.sp-ring { width: 120px; height: 120px; position: relative; margin-bottom: 32px; }
.sp-ring svg { position: absolute; inset: 0; width: 100%; height: 100%; animation: rot 5s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }

.sp-inner {
  position: absolute; inset: 20px;
  background: rgba(232,169,69,.07);
  border: 1px solid rgba(232,169,69,.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.sp-drop { width: 34px; height: 44px; position: relative; }
.sp-drop::before {
  content: ''; position: absolute; inset: 0;
  background: #fff;
  border-radius: 50% 50% 46% 46% / 55% 55% 45% 45%;
}
.sp-dot {
  position: absolute; width: 12px; height: 12px;
  background: var(--gold); border-radius: 50%;
  top: 48%; left: 50%; transform: translate(-50%, -50%);
}

.sp-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; text-align: center; line-height: 1.1; margin-bottom: 5px; }
.sp-brand b { color: var(--gold); font-weight: 800; }
.sp-sub { font-size: 11px; color: rgba(255,255,255,.28); letter-spacing: .22em; text-transform: uppercase; margin-bottom: 52px; }

.sp-bar { width: 150px; height: 3px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
.sp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--teal), var(--gold)); border-radius: 99px; transition: width .1s linear; }
.sp-msg { margin-top: 12px; font-size: 11px; color: rgba(255,255,255,.22); letter-spacing: .07em; min-height: 18px; text-align: center; }
.sp-ver { position: absolute; bottom: 28px; font-size: 10px; color: rgba(255,255,255,.1); letter-spacing: .16em; text-transform: uppercase; }

/* ─── APP ─── */
#app {
  height: 100dvh; overflow-y: auto;
  display: flex; flex-direction: column; align-items: center;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}
#app::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 100% 40% at 50% -5%, rgba(232,169,69,.14) 0%, transparent 65%),
    radial-gradient(ellipse 60% 55% at 100% 100%, rgba(26,79,110,.28) 0%, transparent 60%);
}

.wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 480px;
  padding: 12px 16px 36px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}

/* top bar */
.topbar { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
.tb-left { display: flex; align-items: center; gap: 10px; }
.tb-icon { width: 34px; height: 34px; flex-shrink: 0; position: relative; }
.tb-icon::before {
  content: ''; position: absolute; inset: 5px;
  background: #fff; border-radius: 50% 50% 46% 46% / 55% 55% 45% 45%;
}
.tb-icon::after {
  content: ''; position: absolute;
  width: 10px; height: 10px; background: var(--gold); border-radius: 50%;
  top: 50%; left: 50%; transform: translate(-50%, -38%);
}
.tb-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; }
.tb-name span { color: var(--gold); }
.tb-pill {
  background: rgba(232,169,69,.1); border: 1px solid rgba(232,169,69,.28);
  color: var(--gold); font-size: 10px; padding: 3px 10px;
  border-radius: 99px; letter-spacing: .1em; text-transform: uppercase;
}

/* camera */
.cam-card {
  width: 100%; background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08); border-radius: var(--r); overflow: hidden;
}
#wcwrap {
  width: 100%; aspect-ratio: 4/3; background: #030b16;
  display: flex; align-items: center; justify-content: center; position: relative;
}
#wcwrap canvas { width: 100% !important; height: 100% !important; object-fit: cover; display: block; }
.c { position: absolute; width: 22px; height: 22px; border-color: var(--gold); border-style: solid; opacity: .55; pointer-events: none; }
.c.tl { top:10px; left:10px; border-width:2px 0 0 2px; }
.c.tr { top:10px; right:10px; border-width:2px 2px 0 0; }
.c.bl { bottom:10px; left:10px; border-width:0 0 2px 2px; }
.c.br { bottom:10px; right:10px; border-width:0 2px 2px 0; }
.scan { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); animation:scan 2s ease-in-out infinite; display:none; pointer-events:none; }
@keyframes scan { 0%{top:8%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:92%;opacity:0} }

.empty { color:rgba(255,255,255,.22); text-align:center; padding:28px 20px; display:flex; flex-direction:column; align-items:center; gap:10px; }
.empty svg { opacity:.25; }
.empty p { font-size:13px; line-height:1.6; }

/* buttons */
#startBtn {
  width:100%; padding:17px;
  background:linear-gradient(135deg,var(--gold),var(--amber));
  color:var(--navy); border:none; border-radius:var(--r);
  font-family:'Syne',sans-serif; font-size:16px; font-weight:800;
  letter-spacing:.04em; cursor:pointer;
  box-shadow:0 4px 28px rgba(232,169,69,.35);
  transition:transform .14s,box-shadow .14s;
}
#startBtn:active{transform:scale(.97); box-shadow:0 2px 10px rgba(232,169,69,.2);}
#startBtn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

#newBtn {
  width:100%; padding:17px;
  background:transparent; color:var(--gold);
  border:2px solid rgba(232,169,69,.4); border-radius:var(--r);
  font-family:'Syne',sans-serif; font-size:16px; font-weight:800;
  letter-spacing:.04em; cursor:pointer; display:none;
  transition:background .2s;
}
#newBtn:active{background:rgba(232,169,69,.1);}

/* status + progress */
.srow { width:100%; text-align:center; }
#stxt { font-size:13px; color:rgba(255,255,255,.35); }
.pbar { width:100%; height:3px; background:rgba(255,255,255,.07); border-radius:99px; overflow:hidden; margin-top:8px; display:none; }
.pfill { height:100%; background:linear-gradient(90deg,var(--teal),var(--gold)); border-radius:99px; transition:width .1s linear; }

/* results */
#results { width:100%; display:none; flex-direction:column; gap:10px; }
.rlbl { font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:.17em; text-transform:uppercase; color:rgba(255,255,255,.28); padding-left:2px; }
.topcard {
  width:100%; background:rgba(232,169,69,.08);
  border:1px solid rgba(232,169,69,.22); border-radius:var(--r);
  padding:18px 20px; display:flex; align-items:center; justify-content:space-between;
  transition:box-shadow .5s;
}
.topcard.locked { box-shadow:0 0 0 2px var(--gold), 0 0 36px rgba(232,169,69,.22); }
.tname { font-family:'Syne',sans-serif; font-size:clamp(1.1rem,5vw,1.5rem); font-weight:800; color:var(--gold); }
.tpct { font-size:34px; font-weight:300; }
.tpct small { font-size:15px; color:rgba(255,255,255,.38); }

.bars { display:flex; flex-direction:column; gap:8px; }
.brow { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:12px; padding:10px 14px; }
.bhead { display:flex; justify-content:space-between; margin-bottom:6px; }
.bname { font-size:13px; color:rgba(255,255,255,.75); }
.bval  { font-size:13px; font-weight:500; color:var(--gold); }
.btrack { height:5px; background:rgba(255,255,255,.07); border-radius:99px; overflow:hidden; }
.bfill  { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--teal),var(--gold)); transition:width .35s ease; }

footer { font-size:10px; color:rgba(255,255,255,.09); letter-spacing:.14em; text-transform:uppercase; margin-top:4px; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-ring">
    <svg viewBox="0 0 120 120" fill="none">
      <circle cx="60" cy="60" r="54" stroke="rgba(232,169,69,.12)" stroke-width="2"/>
      <circle cx="60" cy="60" r="54" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="90 250"/>
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#e8a945"/>
          <stop offset="100%" stop-color="#1a4f6e"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="sp-inner">
      <div class="sp-drop"><div class="sp-dot"></div></div>
    </div>
  </div>
  <div class="sp-brand">SMART<br><b>COLOSTRUM</b></div>
  <div class="sp-sub">Kolostrum Kalite Analizi</div>
  <div class="sp-bar"><div class="sp-fill" id="spFill"></div></div>
  <div class="sp-msg" id="spMsg">Başlatılıyor…</div>
  <div class="sp-ver">v1.0 · Demo</div>
</div>

<!-- APP -->
<div id="app">
  <div class="wrap">

    <div class="topbar">
      <div class="tb-left">
        <div class="tb-icon"></div>
        <div class="tb-name">SMART <span>COLOSTRUM</span></div>
      </div>
      <div class="tb-pill">Yapay Zeka Kolostrum Analizi</div>
    </div>

    <div class="cam-card">
      <div id="wcwrap">
        <div class="c tl"></div><div class="c tr"></div>
        <div class="c bl"></div><div class="c br"></div>
        <div class="scan" id="scanLine"></div>
        <div class="empty" id="emptyMsg">
          <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
            <rect x="6" y="12" width="36" height="28" rx="4" stroke="white" stroke-width="2"/>
            <circle cx="24" cy="26" r="8" stroke="white" stroke-width="2"/>
            <path d="M18 12l2-4h8l2 4" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          </svg>
          <p>Tüpü kameraya tutun<br>yapay zeka analiz eder</p>
        </div>
      </div>
    </div>

    <button id="startBtn" onclick="init()">Kamerayı Başlat</button>

    <div class="srow">
      <div id="stxt">—</div>
      <div class="pbar" id="pbar"><div class="pfill" id="pfill"></div></div>
    </div>

    <div id="results">
      <div class="rlbl">Analiz Sonucu</div>
      <div class="topcard" id="topcard">
        <div class="tname" id="tname">—</div>
        <div class="tpct"><span id="tpct">—</span><small>%</small></div>
      </div>
      <div class="bars" id="barsWrap"></div>
    </div>

    <button id="newBtn" onclick="newSample()">↩ Yeni Numune Analiz Et</button>

    <footer>Smart Colostrum · dev. by. Yusuf Bilal CETINKAYA</footer>
  </div>
</div>

<script>
// ══════════════════════════════════════
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/S4apDiyjp/";
// ══════════════════════════════════════

const ANALYSIS_MS = 5000;

// Splash
const spMsgs = ["Uygulama başlatılıyor…","Bileşenler yükleniyor…","Sistem hazırlanıyor…","Hazır!"];
const spFill = document.getElementById("spFill");
const spMsg  = document.getElementById("spMsg");
let spStep = 0;
const spTimer = setInterval(() => {
  spStep++;
  spFill.style.width = (spStep * 25) + "%";
  spMsg.textContent = spMsgs[Math.min(spStep-1, 3)];
  if (spStep >= 4) {
    clearInterval(spTimer);
    setTimeout(() => {
      const el = document.getElementById("splash");
      el.classList.add("out");
      setTimeout(() => el.remove(), 800);
    }, 350);
  }
}, 520);

// App state
let model, webcam, rafId;
let buf = {}, bufN = 0, t0 = null, locked = false;

const stxt    = document.getElementById("stxt");
const pbar    = document.getElementById("pbar");
const pfill   = document.getElementById("pfill");
const results = document.getElementById("results");
const barsWrap= document.getElementById("barsWrap");
const tname   = document.getElementById("tname");
const tpct    = document.getElementById("tpct");
const topcard = document.getElementById("topcard");
const scanLine= document.getElementById("scanLine");
const emptyMsg= document.getElementById("emptyMsg");
const startBtn= document.getElementById("startBtn");
const newBtn  = document.getElementById("newBtn");

async function init() {
  startBtn.disabled = true;
  startBtn.textContent = "Yükleniyor…";
  stxt.textContent = "Model indiriliyor…";
  try {
    model = await tmImage.load(MODEL_URL+"model.json", MODEL_URL+"metadata.json");
    stxt.textContent = "Kamera açılıyor…";
    webcam = new tmImage.Webcam(400, 300, false);
    await webcam.setup({ facingMode: "environment" });
    await webcam.play();

    emptyMsg.style.display = "none";
    document.getElementById("wcwrap").appendChild(webcam.canvas);

    barsWrap.innerHTML = "";
    model.getClassLabels().forEach(lbl => {
      const d = document.createElement("div");
      d.className = "brow";
      d.innerHTML = `<div class="bhead"><span class="bname">${lbl}</span><span class="bval" id="bv-${k(lbl)}">—</span></div><div class="btrack"><div class="bfill" id="bf-${k(lbl)}" style="width:0%"></div></div>`;
      barsWrap.appendChild(d);
    });

    results.style.display = "flex";
    startBtn.style.display = "none";
    startAnalysis();
    loop();
  } catch(e) {
    stxt.textContent = "Hata: " + e.message;
    startBtn.disabled = false;
    startBtn.textContent = "Tekrar Dene";
  }
}

function startAnalysis() {
  locked=false; buf={}; bufN=0; t0=Date.now();
  topcard.classList.remove("locked");
  tname.textContent="…"; tpct.textContent="—";
  model.getClassLabels().forEach(lbl => {
    const v=document.getElementById("bv-"+k(lbl));
    const f=document.getElementById("bf-"+k(lbl));
    if(v) v.textContent="—";
    if(f) f.style.width="0%";
  });
  scanLine.style.display="block";
  pbar.style.display="block";
  pfill.style.width="0%";
  newBtn.style.display="none";
  stxt.textContent="🔍 Numune analiz ediliyor…";
}

function newSample() { startAnalysis(); }

async function loop() {
  webcam.update();
  if (!locked) {
    const ps = await model.predict(webcam.canvas);
    ps.forEach(p => { buf[p.className]=(buf[p.className]||0)+p.probability; });
    bufN++;
    const el = Date.now()-t0;
    pfill.style.width = Math.min(100,(el/ANALYSIS_MS)*100)+"%";
    if (el>=ANALYSIS_MS && bufN>0) lock();
  }
  rafId = requestAnimationFrame(loop);
}

function lock() {
  locked=true;
  scanLine.style.display="none";
  pbar.style.display="none";
  newBtn.style.display="block";

  const avg = Object.entries(buf)
    .map(([c,t])=>({c,p:t/bufN}))
    .sort((a,b)=>b.p-a.p);

  tname.textContent = avg[0].c;
  tpct.textContent  = Math.round(avg[0].p*100);
  topcard.classList.add("locked");

  avg.forEach(({c,p})=>{
    const pct=Math.round(p*100);
    const v=document.getElementById("bv-"+k(c));
    const f=document.getElementById("bf-"+k(c));
    if(v) v.textContent=pct+"%";
    if(f) f.style.width=pct+"%";
  });
  stxt.textContent="✅ Sonuç hazır";
}

function k(s){ return s.replace(/[^a-zA-Z0-9_-]/g,"_"); }

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
